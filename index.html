<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SmartMemo</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="theme-color" content="#D4622A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SmartMemo" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      height:100%; height:100dvh; background:#111;
      display:flex; align-items:center; justify-content:center;
      font-family:'Inter',-apple-system,sans-serif;
      overscroll-behavior:none;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;  /* belt-and-suspenders against any horizontal escape */
    }
    #root { display:flex; align-items:center; justify-content:center; width:100%; height:100%; }

    /* Mobile fullscreen (real phone or installed PWA) */
    @media (max-width:500px), (display-mode:standalone) {
      html, body { background:#fafaf9; }
      .app { border-radius:0 !important; }
      .app-header { padding-top:calc(14px + env(safe-area-inset-top)); }
      .bottom-nav { padding-bottom:calc(6px + env(safe-area-inset-bottom)); }
      .toast { top:calc(20px + env(safe-area-inset-top)); }
      .modal-sheet, .confirm-sheet { padding-bottom:calc(28px + env(safe-area-inset-bottom)); }
      /* Prevent iOS auto-zoom on focus: form inputs must be ≥16px */
      .memo-textarea, .modal-field input, .modal-field select {
        font-size:max(16px, var(--fs-base));
      }
    }
    /* iOS standalone: home indicator already drawn by OS — no extra padding above what env provides */
    button { -webkit-appearance:none; appearance:none; }

    /* CSS Variables (theme) */
    .app {
      --accent:       #D4622A;
      --accent-light: rgba(212,98,42,0.10);
      --accent-text:  #fff;
      --fs-base:      14px;
      --fs-sm:        12px;
      --fs-xs:        11px;
      --fs-lg:        16px;

      width:100%; height:100%;
      display:flex; flex-direction:column;
      background:#fafaf9; color:#1a1a18;
      overflow:hidden; position:relative;
      font-size:var(--fs-base);
    }

    /* Header — height pinned so it cannot vary between tabs */
    .app-header {
      padding:14px 20px 12px;
      background:#fafaf9; border-bottom:1px solid #ebebea;
      display:flex; align-items:baseline; gap:8px;
      flex:0 0 auto;
      min-height:50px;
    }
    .app-header h1 { font-size:18px; font-weight:700; letter-spacing:-0.6px; color:#1a1a18; }
    .app-header .tagline { font-size:var(--fs-xs); color:#a0a09c; }

    /* Tab Content — outer wrapper stays fixed-size; each pane scrolls internally */
    .tab-content {
      flex:1; min-height:0;
      display:flex; flex-direction:column;
      overflow:hidden;
    }
    .tab-pane {
      flex:1; min-height:0;
      overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
    }
    .tab-pane::-webkit-scrollbar { display:none; }
    /* Cards inside any flex-column tab pane must keep their natural height
       and let the pane scroll when content overflows. */
    .tab-pane > * { flex-shrink:0; }

    /* Bottom Nav — height pinned so it cannot vary between tabs */
    .bottom-nav {
      display:flex; background:#fafaf9;
      border-top:1px solid #ebebea;
      padding:10px 0 6px;
      flex:0 0 auto;
      min-height:54px;
    }
    .nav-tab {
      flex:1; display:flex; flex-direction:column;
      align-items:center; gap:3px; cursor:pointer;
    }
    .nav-tab .nav-icon svg { transition:all 0.2s; }
    .nav-tab .nav-label { font-size:10px; font-weight:500; color:#c0c0ba; letter-spacing:0.2px; transition:color 0.2s; }
    .nav-tab.active .nav-label { color:var(--accent); }

    /* Loading */
    .loading-overlay {
      position:absolute; inset:0;
      background:rgba(250,250,249,0.92); backdrop-filter:blur(6px);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
      z-index:100;
    }
    .spinner {
      width:30px; height:30px;
      border:2px solid #e0e0de; border-top-color:var(--accent);
      border-radius:50%; animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size:var(--fs-base); font-weight:500; color:#1a1a18; }
    .loading-sub  { font-size:var(--fs-sm); color:#a0a09c; }

    /* Toast */
    .toast {
      position:absolute; top:64px; left:16px; right:16px;
      background:#1a1a18; color:#fafaf9; border-radius:10px;
      padding:11px 14px; font-size:var(--fs-sm); font-weight:500;
      z-index:200; animation:toastIn .25s ease, toastOut .25s 2.3s ease forwards;
    }
    @keyframes toastIn  { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes toastOut { to{opacity:0} }

    /* Tag Pill */
    .tag-pill {
      display:inline-flex; align-items:center;
      padding:2px 7px; border-radius:4px;
      font-size:10px; font-weight:600; letter-spacing:0.2px;
      background:var(--accent-light); color:var(--accent);
    }

    /* MEMO TAB */
    .memo-tab { padding:18px 16px; display:flex; flex-direction:column; gap:12px; }
    .memo-card { background:#fff; border:1px solid #ebebea; border-radius:12px; overflow:hidden; }
    .memo-card-top {
      padding:12px 14px 0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .memo-card-label { font-size:var(--fs-xs); font-weight:600; color:#a0a09c; letter-spacing:0.6px; text-transform:uppercase; }
    .memo-char-count { font-size:var(--fs-xs); color:#c0c0ba; }
    .memo-textarea {
      width:100%; padding:10px 14px 12px;
      border:none; outline:none; resize:none; min-height:148px;
      font-size:var(--fs-base); font-weight:400; line-height:1.65;
      color:#1a1a18; background:transparent; font-family:inherit;
    }
    .memo-textarea::placeholder { color:#c8c8c4; }
    .memo-actions {
      padding:8px 12px 10px; border-top:1px solid #f0f0ee; display:flex; gap:6px;
    }
    .action-btn {
      display:flex; align-items:center; gap:5px;
      padding:6px 11px; border-radius:7px; border:1px solid #e0e0de;
      background:#fff; cursor:pointer; font-size:var(--fs-xs); font-weight:500;
      color:#4a4a48; font-family:inherit; transition:background .12s;
    }
    .action-btn:hover { background:#f5f5f3; }
    .action-btn.recording { background:#1a1a18; border-color:#1a1a18; color:#fff; }
    .pulse-dot {
      width:8px; height:8px; border-radius:50%;
      background:#fff; display:inline-block;
      animation: rec-pulse 1s ease-in-out infinite;
    }
    @keyframes rec-pulse {
      0%, 100% { opacity:1; transform:scale(1); }
      50%      { opacity:.45; transform:scale(.78); }
    }

    .img-preview { position:relative; border-radius:10px; overflow:hidden; border:1px solid #ebebea; }
    .img-preview img { width:100%; max-height:130px; object-fit:cover; display:block; }
    .img-clear {
      position:absolute; top:6px; right:6px; width:22px; height:22px;
      border-radius:50%; background:rgba(0,0,0,.45); border:none; color:#fff;
      font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    }

    .reflect-btn {
      width:100%; padding:15px; border:none; border-radius:12px;
      background:var(--accent); color:var(--accent-text);
      font-size:var(--fs-base); font-weight:600; letter-spacing:-0.2px;
      cursor:pointer; font-family:inherit;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:opacity .15s, transform .1s;
    }
    .reflect-btn:hover   { opacity:.88; }
    .reflect-btn:active  { transform:scale(.98); }
    .reflect-btn:disabled { opacity:.4; cursor:not-allowed; }
    .reflect-actions { display:flex; flex-direction:column; gap:8px; }
    .reflect-btn-secondary {
      background:#fff;
      color:var(--accent);
      border:1.5px solid var(--accent);
    }
    .reflect-btn-secondary:hover { background:var(--accent-light); opacity:1; }

    .hint-card { background:#fff; border:1px solid #ebebea; border-radius:12px; padding:12px 14px; }
    .hint-title { font-size:var(--fs-xs); font-weight:600; color:#4a4a48; margin-bottom:6px; }
    .hint-body  { font-size:var(--fs-xs); color:#a0a09c; line-height:1.8; }

    /* TODO TAB */
    .todo-tab {
      display:flex; flex-direction:column;
      flex:1; min-height:0;
      overflow:hidden; /* outer doesn't scroll; inner list does */
    }

    .cal-wrapper { background:#fff; border-bottom:1px solid #ebebea; flex-shrink:0; }
    .cal-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px 6px;
    }
    .cal-month-label { font-size:var(--fs-base); font-weight:700; letter-spacing:-.3px; }
    .cal-nav { display:flex; gap:2px; }
    .cal-nav-btn {
      width:26px; height:26px; border:1px solid #e0e0de; background:#fff;
      border-radius:6px; cursor:pointer; font-size:13px; color:#4a4a48;
      display:flex; align-items:center; justify-content:center; transition:background .12s;
    }
    .cal-nav-btn:hover { background:#f5f5f3; }
    .cal-dow { display:grid; grid-template-columns:repeat(7,1fr); padding:0 10px; }
    .cal-dow-cell { text-align:center; font-size:10px; font-weight:600; color:#b0b0ac; padding:3px 0; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:2px 10px 10px; gap:1px; }
    .cal-cell {
      aspect-ratio:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      cursor:pointer; border-radius:7px; transition:background .1s; position:relative;
    }
    .cal-cell:hover { background:#f5f5f3; }
    .cal-num { font-size:13px; font-weight:400; color:#1a1a18; line-height:1; }
    .cal-cell.other-month .cal-num { color:#d0d0cc; }
    .cal-cell.today { background:#f0f0ee; }
    .cal-cell.today .cal-num { font-weight:700; }
    .cal-cell.selected { background:var(--accent) !important; }
    .cal-cell.selected .cal-num { color:#fff !important; font-weight:600; }
    /* Absolute-positioned so the dot never affects cell row height —
       calendar height stays identical regardless of which days have todos. */
    .cal-dot {
      position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
      width:3px; height:3px; border-radius:50%; background:var(--accent);
    }
    .cal-cell.selected .cal-dot { background:rgba(255,255,255,.5); }

    .todo-list-area {
      padding:16px;
      flex:1; min-height:0;
      overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
    }
    .todo-list-area::-webkit-scrollbar { display:none; }
    .section-head { display:flex; align-items:center; gap:7px; margin-bottom:10px; }
    .section-head-label { font-size:var(--fs-xs); font-weight:600; color:#a0a09c; text-transform:uppercase; letter-spacing:.5px; }
    .section-count { font-size:10px; font-weight:700; background:var(--accent); color:#fff; border-radius:10px; padding:1px 7px; }
    .todo-empty { text-align:center; padding:28px 0 10px; color:#c0c0ba; font-size:var(--fs-sm); }
    .divider { height:1px; background:#ebebea; margin:14px 0; }

    /* Todo item */
    .todo-item {
      background:#fff; border:1px solid #ebebea; border-radius:10px;
      padding:11px 12px; margin-bottom:7px;
      display:flex; align-items:flex-start; gap:10px; transition:opacity .2s;
    }
    .todo-item.done { opacity:.45; }
    .todo-check {
      width:18px; height:18px; border-radius:50%; border:1.5px solid #c0c0ba;
      flex-shrink:0; margin-top:2px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all .15s; background:#fff;
    }
    .todo-check.checked { background:var(--accent); border-color:var(--accent); }
    .todo-check.animate-pop { animation: complete-pop .42s cubic-bezier(.34,1.56,.64,1); }
    @keyframes complete-pop {
      0%   { transform:scale(1); box-shadow:0 0 0 0 var(--accent-light); }
      40%  { transform:scale(1.45); box-shadow:0 0 0 10px var(--accent-light); }
      100% { transform:scale(1); box-shadow:0 0 0 0 rgba(0,0,0,0); }
    }
    .todo-item.animate-fade { animation: complete-fade .55s ease; }
    @keyframes complete-fade {
      0%   { background:var(--accent-light); }
      100% { background:#fff; }
    }
    .todo-body { flex:1; min-width:0; cursor:pointer; }
    .todo-title { font-size:var(--fs-base); font-weight:500; color:#1a1a18; line-height:1.45; }
    .todo-item.done .todo-title { text-decoration:line-through; }
    .todo-meta { display:flex; align-items:center; gap:5px; margin-top:5px; flex-wrap:wrap; }
    .todo-date-str { font-size:10px; color:#b0b0ac; display:flex; align-items:center; gap:3px; }
    .todo-del {
      width:24px; height:24px; border:1px solid #ebebea; background:#fff;
      border-radius:6px; cursor:pointer; font-size:11px;
      display:flex; align-items:center; justify-content:center; color:#c0c0ba;
      flex-shrink:0; transition:background .12s, color .12s;
    }
    .todo-del:hover { background:#fdf0f0; color:#c0392b; border-color:#f0d0d0; }

    /* Edit Modal */
    .modal-backdrop {
      position:absolute; inset:0; background:rgba(0,0,0,.35);
      display:flex; align-items:flex-end; z-index:300;
      animation:bdIn .2s ease;
      max-width:100%; max-height:100%; /* never escape parent .app */
    }
    @keyframes bdIn { from{opacity:0} to{opacity:1} }
    .modal-sheet {
      background:#fafaf9; border-radius:18px 18px 0 0;
      width:100%; padding:20px 18px 32px;
      animation:sheetUp .25s ease;
    }
    @keyframes sheetUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-handle { width:36px; height:4px; border-radius:2px; background:#d0d0cc; margin:0 auto 18px; }
    .modal-title { font-size:15px; font-weight:700; margin-bottom:16px; letter-spacing:-.3px; }
    .modal-field { margin-bottom:12px; }
    .modal-field label { display:block; font-size:var(--fs-xs); font-weight:600; color:#a0a09c; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
    .modal-field input, .modal-field select {
      width:100%; padding:9px 11px; border:1px solid #e0e0de; border-radius:8px;
      font-size:var(--fs-base); color:#1a1a18; background:#fff; font-family:inherit; outline:none;
    }
    .modal-field input:focus, .modal-field select:focus { border-color:var(--accent); }
    .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .modal-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .modal-tag {
      padding:5px 10px; border-radius:6px; border:1px solid #e0e0de;
      font-size:var(--fs-xs); font-weight:500; cursor:pointer; background:#fff; color:#4a4a48;
      transition:all .12s;
    }
    .modal-tag.sel { background:var(--accent); border-color:var(--accent); color:#fff; }
    .modal-actions { display:flex; gap:8px; margin-top:18px; }
    .modal-cancel {
      flex:1; padding:12px; border:1px solid #e0e0de; border-radius:10px;
      background:#fff; font-size:var(--fs-base); font-weight:500; cursor:pointer; font-family:inherit;
    }
    .modal-save {
      flex:2; padding:12px; border:none; border-radius:10px;
      background:var(--accent); color:#fff;
      font-size:var(--fs-base); font-weight:600; cursor:pointer; font-family:inherit;
    }

    /* Confirm Sheet */
    .confirm-sheet {
      background:#fafaf9; border-radius:18px 18px 0 0;
      width:100%; max-height:88%; padding:20px 18px 22px;
      display:flex; flex-direction:column;
      animation:sheetUp .25s ease;
    }
    .confirm-header { margin-bottom:12px; }
    .confirm-title { font-size:15px; font-weight:700; letter-spacing:-.3px; margin-bottom:4px; }
    .confirm-sub   { font-size:var(--fs-xs); color:#a0a09c; line-height:1.55; }
    .confirm-list  { flex:1; overflow-y:auto; min-height:60px; padding:2px 0 6px; }
    .confirm-list::-webkit-scrollbar { display:none; }
    .confirm-actions {
      display:flex; gap:8px; margin-top:12px;
      border-top:1px solid #ebebea; padding-top:14px;
    }
    .modal-save:disabled { opacity:.4; cursor:not-allowed; }
    .confirm-section-head {
      font-size:var(--fs-xs); font-weight:600; color:#a0a09c;
      text-transform:uppercase; letter-spacing:.5px;
      margin:8px 2px 6px;
    }
    .confirm-section-head:first-child { margin-top:0; }
    .merge-indicator {
      display:inline-block; font-size:10px; color:var(--accent);
      font-weight:600; margin-top:3px; margin-right:6px;
    }
    .modal-field textarea {
      width:100%; padding:9px 11px; border:1px solid #e0e0de; border-radius:8px;
      font-size:var(--fs-base); color:#1a1a18; background:#fff; font-family:inherit;
      outline:none; resize:vertical; min-height:84px; line-height:1.55;
    }
    .modal-field textarea:focus { border-color:var(--accent); }

    /* IDEAS TAB */
    .ideas-tab { padding:16px; display:flex; flex-direction:column; gap:8px; }
    .idea-card {
      background:#fff; border:1px solid #ebebea; border-radius:10px;
      padding:13px 14px; cursor:pointer; transition:background .12s;
      display:flex; gap:10px; align-items:flex-start;
    }
    .idea-card:hover { background:#fafaf9; }
    .idea-card-body { flex:1; min-width:0; }
    .idea-project {
      font-size:var(--fs-base); font-weight:600; color:#1a1a18;
      letter-spacing:-.2px; line-height:1.35;
    }
    .idea-summary { font-size:var(--fs-sm); color:#4a4a48; line-height:1.55; margin-top:4px; }
    .idea-details { list-style:none; margin-top:8px; display:flex; flex-direction:column; gap:4px; }
    .idea-detail {
      font-size:var(--fs-xs); color:#4a4a48; padding-left:14px;
      position:relative; line-height:1.55;
    }
    .idea-detail::before {
      content:''; position:absolute; left:4px; top:7px;
      width:4px; height:4px; border-radius:50%; background:var(--accent);
    }
    .idea-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .idea-updated { font-size:10px; color:#b0b0ac; }
    .ideas-empty {
      text-align:center; padding:60px 20px; color:#a0a09c;
      font-size:var(--fs-sm); line-height:1.7;
    }

    /* SETTINGS TAB */
    .settings-tab { padding:18px 16px; display:flex; flex-direction:column; gap:10px; }
    .settings-section-title {
      font-size:var(--fs-xs); font-weight:600; color:#a0a09c;
      text-transform:uppercase; letter-spacing:.6px;
      padding:0 2px; margin-bottom:2px;
    }
    .settings-card { background:#fff; border:1px solid #ebebea; border-radius:12px; overflow:hidden; }
    .settings-row {
      padding:13px 16px; display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid #f0f0ee;
    }
    .settings-row:last-child { border-bottom:none; }
    .settings-row-label { font-size:var(--fs-base); font-weight:500; color:#1a1a18; }
    .settings-row-sub   { font-size:var(--fs-xs); color:#a0a09c; margin-top:1px; }

    /* Color swatches */
    .color-swatches { display:flex; gap:10px; }
    .color-swatch {
      width:28px; height:28px; border-radius:50%; cursor:pointer;
      border:2px solid transparent; transition:all .15s; position:relative;
    }
    .color-swatch.sel { border-color:#1a1a18; transform:scale(1.12); }
    .color-swatch.sel::after {
      content:''; position:absolute; inset:3px;
      border-radius:50%; border:1.5px solid rgba(255,255,255,.8);
    }

    /* Font size selector */
    .font-size-opts { display:flex; gap:6px; }
    .font-size-opt {
      padding:5px 12px; border-radius:7px; border:1px solid #e0e0de;
      background:#fff; cursor:pointer; font-family:inherit; color:#4a4a48;
      font-weight:500; transition:all .12s;
    }
    .font-size-opt.sel { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* Toggle */
    .toggle {
      width:44px; height:26px; border-radius:13px; border:none; cursor:pointer;
      position:relative; transition:background .2s;
    }
    .toggle::after {
      content:''; position:absolute; top:3px; left:3px;
      width:20px; height:20px; border-radius:50%; background:#fff;
      box-shadow:0 1px 3px rgba(0,0,0,.2); transition:left .2s;
    }
    .toggle.on { background:var(--accent); }
    .toggle.on::after { left:21px; }
    .toggle.off { background:#d0d0cc; }

    /* Gemini API key field */
    .api-row { padding:14px 16px; }
    .api-input-row { display:flex; gap:6px; margin-top:8px; }
    .api-input-row input {
      flex:1; padding:8px 11px; border:1px solid #e0e0de; border-radius:7px;
      font-size:var(--fs-sm); color:#1a1a18; background:#fff;
      font-family:inherit; outline:none;

function loadStored(key, fallback) {

// ─────────────────────────────────────────────────────────────
// Gemini API integration — text generation, image OCR, audio transcription.
// Uses the Generative Language REST API directly so no SDK is needed.
// API key is stored in localStorage (settings.geminiApiKey).
// ─────────────────────────────────────────────────────────────
const GEMINI_MODEL = 'gemini-2.5-flash';
const GEMINI_URL = key =>
  `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(key)}`;

async function callGemini(apiKey, parts) {
  if (!apiKey) throw new Error('no_api_key');
  const res = await fetch(GEMINI_URL(apiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts }] }),
  });
  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json())?.error?.message || ''; } catch {}
    throw new Error(`Gemini ${res.status}${detail ? ': ' + detail : ''}`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}
const callGeminiText   = (key, text) => callGemini(key, [{ text }]);
const callGeminiVision = (key, prompt, base64, mime) => callGemini(key, [
  { text: prompt },
  { inline_data: { mime_type: mime, data: base64 } },
]);
const callGeminiAudio  = (key, base64, mime) => callGemini(key, [
  { text: '以下の音声を日本語で文字起こししてください。テキストのみを返してください。' },

]);

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve((r.result || '').split(',')[1] || '');
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

// Two-tone success "ding" via Web Audio API — no asset, no network.
// Triggered from a user tap, so iOS auto-resumes the audio context.
let _audioCtx;
function playCompleteSound() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const now = _audioCtx.currentTime;
    [659.25, 987.77].forEach((freq, i) => {
      const osc = _audioCtx.createOscillator();
      const gain = _audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = now + i * 0.07;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.18, t + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
      osc.connect(gain).connect(_audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.27);
    });
  } catch {}
}

// Synchronous persisted state — writes to localStorage inside the setter so

function usePersistedState(key, defaultValue) {
  const [state, setState] = useState(() => loadStored(key, defaultValue));
  const set = updater => {
    setState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveStored(key, next);
      return next;
    });
  };
  return [state, set];
}

const pad = n => String(n).padStart(2,'0');
const today = new Date();

const todayStr = formatDate(today);
const MONTH_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOW = ['日','月','火','水','木','金','土'];
// Built-in tags. アイデア is reserved for the Ideas tab and never auto-tagged

const BUILTIN_TODO_TAGS = ['買い物','仕事','家事','健康','勉強','その他'];

  { name:'インディゴ', value:'#4A52C8', light:'rgba(74,82,200,.10)', text:'#fff' },

  { label:'中', base:'14px', sm:'12px', xs:'11px' },

// ─────────────────────────────────────────────────────────────
// Local heuristic parser — used when window.claude.complete is unavailable.
// Classifies lines into TODOs vs Ideas, splits multi-items, extracts
// dates/periods/times, auto-tags, and matches ideas against existing
// projects so additional details merge instead of duplicating.
// ─────────────────────────────────────────────────────────────
const TAG_KEYWORDS = {
  '買い物': ['買う','購入','買い','スーパー','コンビニ','注文'],
  '仕事':   ['会議','打ち合わせ','プレゼン','資料','メール','送付','クライアント','出張','報告','アポ','商談','提出','業務'],
  '家事':   ['掃除','洗濯','片付け','料理','ゴミ','炊事','整理'],
  '健康':   ['運動','ジム','ランニング','病院','診察','薬','歯医者','ヨガ'],
  '勉強':   ['勉強','学習','読書','講座','英語','復習','予習'],
  'アイデア': ['アイデア','思いつき','構想','企画','検討','コンセプト'],
};

const ACTION_VERB_RE = /(買う|購入|やる|行く|来る|帰る|完了|終わ(る|らせる)|確認|チェック|送る|送付|提出|連絡|電話|メール|会う|参加|準備|予約|予定|出発|到着|出張|締切|片付け|掃除|洗濯)/;
const DATE_TOKEN_RE  = /(今日|明日|明後日|昨日|来週.曜?|今週.曜?|来月|今月|\d{1,2}[\/月]\d{1,2}日?|\d{1,2}月中|\d{4}[-/]\d{1,2}[-/]\d{1,2})/;
const TIME_TOKEN_RE  = /\d{1,2}[:時]\d{0,2}分?(に|から|まで)?/;
const IDEA_HINT_RE   = /(アイデア|構想|企画|思いつき|について|案$|コンセプト)/;

// Convert full-width digits and tilde to half-width so the regexes below
// catch "７月１日〜１５日" and "8月1日～15日" the same way.
function normalizeDateChars(text) {
  return text
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[～〜]/g, '~');
}

function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function nextWeekday(from, target) {
  const d = new Date(from);
  const cur = d.getDay();
  let diff = (target - cur + 7) % 7;
  if (diff === 0) diff = 7;
  d.setDate(d.getDate()+diff);
  return d;
}
function lastDayOfMonth(year, month1) { return new Date(year, month1, 0).getDate(); }

function parseRelative(rawText) {
  const text = normalizeDateChars(rawText);
  const dowMap = { '日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6 };
  const yy = today.getFullYear();

  // 1. Cross-month range: "8月1日〜9月15日" / "8/1〜9/15" / "8月1日から9月15日まで"
  const xmr = text.match(/(\d{1,2})[\/月](\d{1,2})日?\s*(?:[~\-]|から)\s*(\d{1,2})[\/月](\d{1,2})日?\s*まで?/);
  if (xmr) {
    return {
      startDate: `${yy}-${pad(+xmr[1])}-${pad(+xmr[2])}`,
      endDate:   `${yy}-${pad(+xmr[3])}-${pad(+xmr[4])}`,
    };
  }

  // 2. Single-month range: "7月1日〜15日" / "7/1〜15" / "7月1日から15日まで"
  const smr = text.match(/(\d{1,2})[\/月](\d{1,2})日?\s*(?:[~\-]|から)\s*(\d{1,2})日?\s*まで?/);
  if (smr) {
    return {
      startDate: `${yy}-${pad(+smr[1])}-${pad(+smr[2])}`,
      endDate:   `${yy}-${pad(+smr[1])}-${pad(+smr[3])}`,
    };
  }

  // 3. Whole month: "8月中" / "今月中" / "来月中"
  const mc = text.match(/(\d{1,2})月中/);
  if (mc) {
    const m = +mc[1];
    return {
      startDate: `${yy}-${pad(m)}-01`,
      endDate:   `${yy}-${pad(m)}-${pad(lastDayOfMonth(yy, m))}`,
    };
  }
  if (/今月中/.test(text)) {
    const m = today.getMonth() + 1;
    return {
      startDate: `${yy}-${pad(m)}-01`,
      endDate:   `${yy}-${pad(m)}-${pad(lastDayOfMonth(yy, m))}`,
    };
  }
  if (/来月中/.test(text)) {
    let m = today.getMonth() + 2, y = yy;
    if (m > 12) { m -= 12; y += 1; }
    return {
      startDate: `${y}-${pad(m)}-01`,
      endDate:   `${y}-${pad(m)}-${pad(lastDayOfMonth(y, m))}`,
    };
  }

  // 4. Relative range: "明日から来週水曜まで"
  const rr = text.match(/(今日|明日|明後日|来週(.)曜?|今週(.)曜?)\s*から\s*(今日|明日|明後日|来週(.)曜?|今週(.)曜?)\s*まで/);
  if (rr) return { startDate: formatDate(resolveRel(rr[1])), endDate: formatDate(resolveRel(rr[4])) };

  // 5. Single relative
  const single = text.match(/(今日|明日|明後日|来週(.)曜?|今週(.)曜?)/);
  if (single) return { startDate: formatDate(resolveRel(single[1])), endDate: '' };

  // 6. Explicit YYYY-MM-DD
  const ymd = text.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if (ymd) return { startDate: `${ymd[1]}-${pad(+ymd[2])}-${pad(+ymd[3])}`, endDate: '' };

  // 7. Single month/day: "7月1日" / "7/1"
  const md = text.match(/(\d{1,2})[\/月](\d{1,2})日?/);
  if (md) return { startDate: `${yy}-${pad(+md[1])}-${pad(+md[2])}`, endDate: '' };

  return { startDate: '', endDate: '' };

  function resolveRel(s) {
    if (s === '今日') return today;
    if (s === '明日') return addDays(today,1);
    if (s === '明後日') return addDays(today,2);
    const wkM = s.match(/^(来週|今週)(.)曜?/);
    if (wkM) {
      const w = dowMap[wkM[2]];
      if (w === undefined) return today;
      const base = wkM[1] === '来週' ? addDays(today,7) : today;
      return nextWeekday(base, w);
    }
    return today;
  }
}

function parseTime(rawText) {
  const text = normalizeDateChars(rawText);
  const m = text.match(/(\d{1,2})[:時](\d{1,2})?/);
  if (!m) return '';
  return `${pad(+m[1])}:${pad(+(m[2]||0))}`;
}

// Strip date / time tokens from the line so verb-splitter doesn't treat them
// as nouns. Patterns are ordered most-specific first so ranges win over
// single-day matches. Trailing/leading particles (に/は/から/まで…) left
// behind by stripped tokens are also cleaned.
function stripDateTimeWords(rawText) {
  let t = normalizeDateChars(rawText);
  // Cross-month range
  t = t.replace(/(\d{1,2})[\/月](\d{1,2})日?\s*(?:[~\-]|から)\s*(\d{1,2})[\/月](\d{1,2})日?\s*まで?/g, '');
  // Single-month range
  t = t.replace(/(\d{1,2})[\/月](\d{1,2})日?\s*(?:[~\-]|から)\s*(\d{1,2})日?\s*まで?/g, '');
  // Whole month
  t = t.replace(/(\d{1,2}|今|来)月中/g, '');
  // Relative range
  t = t.replace(/(今日|明日|明後日|来週.曜?|今週.曜?)\s*から\s*(今日|明日|明後日|来週.曜?|今週.曜?)\s*まで/g, '');
  // Single relatives
  t = t.replace(/(今日|明日|明後日|昨日|来週.曜?|今週.曜?|来月|今月)/g, '');
  // YYYY-MM-DD
  t = t.replace(/\d{4}[-/]\d{1,2}[-/]\d{1,2}/g, '');
  // Month/day single
  t = t.replace(/\d{1,2}[\/月]\d{1,2}日?/g, '');
  // Time
  t = t.replace(TIME_TOKEN_RE, '');
  // Drop dangling particles left at the start ("に/から/まで/は/の/へ")
  t = t.replace(/^(に|から|まで|は|の|へ)\s*/, '');
  // Trim leading/trailing punctuation
  t = t.replace(/^[、,・\s]+|[、,・\s]+$/g, '').trim();
  return t;
}

function inferTags(text) {
  const tags = [];
  for (const [tag, kws] of Object.entries(TAG_KEYWORDS)) {
    if (kws.some(k => text.includes(k))) tags.push(tag);
  }
  if (tags.length === 0) tags.push('その他');
  return tags;
}
// TODO tagger — never returns 'アイデア'.
function inferTagsForTodo(text) {
  return inferTags(text).filter(t => t !== IDEA_TAG);
}
// Idea tagger — defaults to 'アイデア' if nothing else matches.
function inferTagsForIdea(text) {
  const t = inferTags(text).filter(x => x !== 'その他');
  return t.length ? t : [IDEA_TAG];
}

function isTodoLine(line) {
  if (IDEA_HINT_RE.test(line) && !ACTION_VERB_RE.test(line)) return false;
  return ACTION_VERB_RE.test(line) || DATE_TOKEN_RE.test(line);
}

function extractTodosFromLine(line) {
  const dates = parseRelative(line);
  const time = parseTime(line);
  const cleaned = stripDateTimeWords(line);
  const out = [];

  // Shared-verb pattern: "X、Y、Zを買う"
  const verbM = cleaned.match(/^(.+?)(?:を)?(買う|購入|チェック|確認|送る|完了|やる|提出|送付)$/);
  if (verbM && /[、,・]/.test(verbM[1])) {
    const nouns = verbM[1].split(/[、,・]/).map(s=>s.trim()).filter(Boolean);
    const verb = verbM[2];
    const tags = inferTagsForTodo(line);
    for (const n of nouns) {
      out.push({ title:`${n}を${verb}`, startDate:dates.startDate, endDate:dates.endDate, time, tags });
    }
    return out;
  }

  // Otherwise split by 、 if multiple clauses
  const parts = cleaned.split(/[、,]/).map(s=>s.trim()).filter(Boolean);
  if (parts.length > 1) {
    for (const p of parts) {
      out.push({ title:p, startDate:dates.startDate, endDate:dates.endDate, time, tags:inferTagsForTodo(p) });
    }
  } else {
    out.push({ title: cleaned || line, startDate:dates.startDate, endDate:dates.endDate, time, tags:inferTagsForTodo(line) });
  }
  return out;
}

function extractIdeaFromLine(line, existingProjects) {
  let projectName = '';
  let summary = line;

  // "X: Y" / "Xについて: Y" / "【X】Y" / "■X Y"
  const colonM = line.match(/^([^:：]{1,40})[:：]\s*(.+)$/);
  if (colonM) {
    projectName = colonM[1].replace(/^[■◆●▼※【\[]+|[】\]]+$/g, '').trim();
    projectName = projectName.replace(/(について|のアイデア|の話|のメモ|の構想|の企画|案|構想|企画)$/, '').trim();
    summary = colonM[2].trim();
  } else {
    const bracketM = line.match(/^[■◆●▼※【\[]+(.+?)[】\]]+\s*(.*)$/);
    if (bracketM) {
      projectName = bracketM[1].trim();
      summary = bracketM[2].trim() || projectName;
    }
  }

  // Match existing projects (substring either way, case-insensitive)
  const tryMatch = (candidate) => {
    if (!candidate || !existingProjects.length) return null;
    const c = candidate.toLowerCase();
    return existingProjects.find(p => {
      if (!p) return false;
      const pl = p.toLowerCase();
      return pl === c || pl.includes(c) || c.includes(pl);
    }) || null;
  };
  if (projectName) {
    const matched = tryMatch(projectName);
    if (matched) projectName = matched;
  }
  if (!projectName) {
    // Try matching whole line against existing project names
    const matched = existingProjects.find(p => p && line.includes(p));
    if (matched) projectName = matched;
  }
  if (!projectName) {
    projectName = line.length <= 16 ? line : 'メモ';
  }

  return {
    projectName,
    summary: summary === projectName ? '' : summary,
    details: [],
    tags: inferTagsForIdea(line),
  };
}

function localParseAll(memo, existingProjects = []) {
  const lines = memo.split(/[\n。]/).map(l=>l.trim()).filter(Boolean);
  const todos = [];
  const ideas = [];
  for (const line of lines) {
    if (isTodoLine(line)) {
      todos.push(...extractTodosFromLine(line));
    } else {
      ideas.push(extractIdeaFromLine(line, existingProjects));
    }
  }
  return { todos, ideas };
}

// Merge incoming idea drafts into existing ideas. If projectName matches
// (case-insensitive), append summary/details/tags; otherwise create new.
function mergeIdeas(existing, incoming) {
  const result = existing.map(e => ({ ...e, details: [...(e.details||[])], tags: [...(e.tags||[])] }));
  const todayDate = formatDate(new Date());
  for (const inc of incoming) {
    if (!inc || !inc.projectName) continue;
    const idx = result.findIndex(e =>
      (e.projectName || '').toLowerCase().trim() === (inc.projectName || '').toLowerCase().trim()
    );
    if (idx >= 0) {
      const cur = result[idx];
      const newDetails = [...cur.details];
      // Push incoming summary as a detail if it adds info
      if (inc.summary && inc.summary !== cur.summary && !newDetails.includes(inc.summary)) {
        newDetails.push(inc.summary);
      }
      for (const d of (inc.details || [])) {
        if (d && !newDetails.includes(d)) newDetails.push(d);
      }
      const newTags = Array.from(new Set([...cur.tags, ...((inc.tags) || [])]));
      result[idx] = {
        ...cur,
        summary: cur.summary || inc.summary || '',
        details: newDetails,
        tags: newTags,
        updatedAt: todayDate,
      };
    } else {
      result.push({
        id: Date.now() + Math.random(),
        projectName: inc.projectName,
        summary: inc.summary || '',
        details: [...(inc.details || [])],
        tags: [...((inc.tags) || ['アイデア'])],
        createdAt: todayDate,
        updatedAt: todayDate,
      });
    }
  }
  return result;
}

async function parseMemoToItems(text, existingProjects = [], apiKey = '') {
  const prompt =
        `あなたはメモを解析するアシスタントです。以下のメモを「TODO」と「アイデア」に分類し、JSONのみを返してください。\n\n` +
        `ルール:\n` +
        `1. TODO: 実行可能なタスク・予定・買い物・連絡など、行動動詞または日付/期限のあるもの\n` +
        `2. アイデア: 思いつき・構想・企画・コンセプト・将来やりたいこと\n` +
        `3. 複数項目は分割。「明日、にんじん、玉ねぎを買う」→「にんじんを買う」「玉ねぎを買う」（「明日」は日付なのでタイトルに含めずstartDateに）\n` +
        `4. 日付は YYYY-MM-DD。期間は startDate と endDate 両方、単日は endDate=""\n` +
        `   - 「8月中」      → startDate=yyyy-08-01, endDate=yyyy-08-31\n` +
        `   - 「7月1日〜15日」 → startDate=yyyy-07-01, endDate=yyyy-07-15\n` +
        `   - 「7月1日〜8月15日」→ startDate=yyyy-07-01, endDate=yyyy-08-15\n` +
        `   - 「明日から来週水曜まで」→ 期間で記述\n` +
        `5. 時間は HH:MM か ""。\n` +
        `   - TODOのtags: 買い物 / 仕事 / 家事 / 健康 / 勉強 / その他（「アイデア」は使わない）\n` +
        `   - アイデアのtags: アイデア / 買い物 / 仕事 / 家事 / 健康 / 勉強\n` +
        `6. アイデアは projectName で分類。下記の既存プロジェクトと類似する場合、必ずその名前を使用すること\n` +
        `7. 既存プロジェクト: ${JSON.stringify(existingProjects)}\n` +
        `8. 本日: ${todayStr}（年が指定されていない月日は${today.getFullYear()}年として扱う）\n\n` +
        `形式（JSONのみ）:\n` +
        `{"todos":[{"title":"","startDate":"","endDate":"","time":"","tags":[]}],"ideas":[{"projectName":"","summary":"","details":[],"tags":[]}]}\n\n` +
        `メモ:\n${text}`;

  const tryParseJson = res => {
    const m = (res || '').match(/\{[\s\S]*\}/);
    if (!m) return null;
    try {
      const parsed = JSON.parse(m[0]);
      return {
        todos: Array.isArray(parsed.todos) ? parsed.todos : [],
        ideas: Array.isArray(parsed.ideas) ? parsed.ideas : [],
      };
    } catch { return null; }
  };

  // 1. Gemini API (primary if API key configured)
  if (apiKey) {
    try {
      const out = await callGeminiText(apiKey, prompt);
      const parsed = tryParseJson(out);
      if (parsed) return parsed;
    } catch (e) {
      console.warn('[Gemini] memo parse failed:', e);
    }
  }

  // 2. claude.ai/design bridge if running there
  const claude = typeof window !== 'undefined' && window.claude && window.claude.complete;
  if (claude) {
    try {
      const out = await window.claude.complete(prompt);
      const parsed = tryParseJson(out);
      if (parsed) return parsed;
    } catch {}
  }

  // 3. Local heuristic fallback
  return localParseAll(text, existingProjects);
}

// ─────────────────────────────────────────────────────────────
// Calendar
// ─────────────────────────────────────────────────────────────
function Calendar({ todos, selectedDate, onSelect }) {
  const [vy, setVy] = useState(today.getFullYear());
  const [vm, setVm] = useState(today.getMonth());
  const swipeRef = useRef(null);

  const firstDay = new Date(vy, vm, 1);
  const lastDay  = new Date(vy, vm+1, 0);
  const cells = [];
  for (let i = firstDay.getDay()-1; i >= 0; i--) cells.push({ date:new Date(vy,vm,-i), cur:false });
  for (let d = 1; d <= lastDay.getDate(); d++) cells.push({ date:new Date(vy,vm,d), cur:true });
  // Always pad to 6 rows (42 cells) so the calendar height is constant
  // regardless of which month is displayed.
  while (cells.length < 42) {
    const l = cells[cells.length-1].date;
    cells.push({ date:new Date(l.getTime()+86400000), cur:false });
  }

  const dotSet = new Set();
  todos.forEach(t => {
    if (!t.startDate) return;
    const s = new Date(t.startDate), e = t.endDate ? new Date(t.endDate) : s;
    for (let d=new Date(s); d<=e; d.setDate(d.getDate()+1)) dotSet.add(formatDate(new Date(d)));
  });

  const prev = () => vm===0 ? (setVm(11),setVy(y=>y-1)) : setVm(m=>m-1);
  const next = () => vm===11 ? (setVm(0),setVy(y=>y+1)) : setVm(m=>m+1);

  // Horizontal swipe → change month
  function onTouchStart(e) {
    const t = e.touches[0];
    swipeRef.current = { x: t.clientX, y: t.clientY, time: Date.now() };
  }
  function onTouchEnd(e) {
    if (!swipeRef.current) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - swipeRef.current.x;
    const dy = t.clientY - swipeRef.current.y;
    const dt = Date.now() - swipeRef.current.time;
    swipeRef.current = null;
    if (dt > 600) return;                       // too slow — likely scroll
    if (Math.abs(dx) < 50) return;              // too short
    if (Math.abs(dy) > Math.abs(dx) * 0.6) return; // too vertical
    if (dx < 0) next(); else prev();
  }

  return (
    <div className="cal-wrapper" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div className="cal-head">
        <span className="cal-month-label">{vy}年 {MONTH_JP[vm]}</span>
        <div className="cal-nav">
          <button className="cal-nav-btn" onClick={prev}>‹</button>
          <button className="cal-nav-btn" onClick={next}>›</button>
        </div>
      </div>
      <div className="cal-dow">{DOW.map(d=><div key={d} className="cal-dow-cell">{d}</div>)}</div>
      <div className="cal-grid">
        {cells.map((c,i)=>{
          const ds=formatDate(c.date), isTd=ds===todayStr, isSel=ds===selectedDate, hasDot=dotSet.has(ds);
          return (
            <div key={i} className={`cal-cell${!c.cur?' other-month':''}${isTd&&!isSel?' today':''}${isSel?' selected':''}`} onClick={()=>onSelect(ds)}>
              <span className="cal-num">{c.date.getDate()}</span>
              {hasDot && <div className="cal-dot"/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function EditModal({ todo, onSave, onClose, customTags = [] }) {

function TodoItem({ todo, onToggle, onDelete, onEdit, soundEnabled }) {
  const [animating, setAnimating] = useState(false);
  function handleToggle() {
    if (!todo.done) {
      setAnimating(true);
      if (soundEnabled) playCompleteSound();
      setTimeout(() => setAnimating(false), 600);
    }
    onToggle(todo.id);
  }
  return (
    <div className={`todo-item${todo.done?' done':''}${animating?' animate-fade':''}`}>
      <div className={`todo-check${todo.done?' checked':''}${animating?' animate-pop':''}`} onClick={handleToggle}>
        {todo.done && <IcoCheck />}
      </div>
      <div className="todo-body" onClick={()=>onEdit(todo)}>
        <div className="todo-title">{todo.title}</div>
        <div className="todo-meta">
          {todo.startDate && (
            <span className="todo-date-str">
              <IcoCalSm />
              {todo.startDate}{todo.endDate ? ` — ${todo.endDate}`:''}{todo.time ? `  ${todo.time}`:''}
            </span>
          )}
          {(todo.tags||[]).map(t=><span key={t} className="tag-pill">{t}</span>)}
        </div>
      </div>
      <button className="todo-del" onClick={()=>onDelete(todo.id)}>✕</button>
    </div>
  );
}

function ConfirmSheet({ pending, existingProjects, customTags, onUpdateTodo, onDeleteTodo, onUpdateIdea, onDeleteIdea, onConfirm, onCancel }) {
  const [editingTodo, setEditingTodo] = useState(null);
  const [editingIdea, setEditingIdea] = useState(null);
  const total = pending.todos.length + pending.ideas.length;

  return (
    <div className="modal-backdrop" onClick={e => { if(e.target===e.currentTarget) onCancel(); }}>
      <div className="confirm-sheet">
        <div className="modal-handle"/>
        <div className="confirm-header">
          <div className="confirm-title">追加内容を確認</div>
          <div className="confirm-sub">
            TODO {pending.todos.length}件・アイデア {pending.ideas.length}件 を抽出しました。タップで編集、✕で除外できます。
          </div>
        </div>
        <div className="confirm-list">
          {total === 0 && <div className="todo-empty">追加するアイテムがありません</div>}

          {pending.todos.length > 0 && <div className="confirm-section-head">TODO（{pending.todos.length}）</div>}
          {pending.todos.map(t => (
            <div key={t.id} className="todo-item">
              <div className="todo-body" onClick={()=>setEditingTodo(t)}>
                <div className="todo-title">{t.title}</div>
                <div className="todo-meta">
                  {t.startDate && (
                    <span className="todo-date-str">
                      <IcoCalSm />
                      {t.startDate}{t.endDate ? ` — ${t.endDate}` : ''}{t.time ? `  ${t.time}` : ''}
                    </span>
                  )}
                  {(t.tags||[]).map(tag => <span key={tag} className="tag-pill">{tag}</span>)}
                </div>
              </div>
              <button className="todo-del" onClick={()=>onDeleteTodo(t.id)}>✕</button>
            </div>
          ))}

          {pending.ideas.length > 0 && <div className="confirm-section-head">アイデア（{pending.ideas.length}）</div>}
          {pending.ideas.map(i => {
            const isExisting = existingProjects.includes(i.projectName);
            return (
              <div key={i.id} className="todo-item">
                <div className="todo-body" onClick={()=>setEditingIdea(i)}>
                  <div className="todo-title">{i.projectName}</div>
                  {isExisting && <span className="merge-indicator">既存『{i.projectName}』に追記</span>}
                  <div className="todo-meta">
                    {i.summary && <span className="todo-date-str" style={{color:'#6a6a68'}}>{i.summary}</span>}
                    {(i.tags||[]).map(tag => <span key={tag} className="tag-pill">{tag}</span>)}
                  </div>
                </div>
                <button className="todo-del" onClick={()=>onDeleteIdea(i.id)}>✕</button>
              </div>
            );
          })}
        </div>
        <div className="confirm-actions">
          <button className="modal-cancel" onClick={onCancel}>キャンセル</button>
          <button className="modal-save" onClick={onConfirm} disabled={total===0}>
            {total > 0 ? `${total}件を追加` : '追加'}
          </button>
        </div>
      </div>
      {editingTodo && (
        <EditModal todo={editingTodo}
          onSave={u => { onUpdateTodo(u); setEditingTodo(null); }}
          onClose={()=>setEditingTodo(null)}
          customTags={customTags} />
      )}
      {editingIdea && (
        <IdeaEditModal idea={editingIdea} projects={existingProjects}
          onSave={u => { onUpdateIdea(u); setEditingIdea(null); }}
          onClose={()=>setEditingIdea(null)}
          customTags={customTags} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Memo Tab
// ─────────────────────────────────────────────────────────────
function MemoTab({ existingProjects, customTags, geminiApiKey, onCommit }) {
  const [text,      setText]     = useState('');
  const [loading,   setLoading]  = useState(false);
  const [loadingMsg,setLMsg]     = useState('');
  const [recording, setRec]      = useState(false);
  const [imgPrev,   setImgPrev]  = useState(null);
  const [toast,     setToast]    = useState(null);
  const [pending,   setPending]  = useState(null);
  const fileRef       = useRef(null);
  const recRef        = useRef(null);
  const tRef          = useRef(null);
  const baseTextRef   = useRef('');
  const finalTextRef  = useRef('');

  function showToast(msg) { setToast(msg); clearTimeout(tRef.current); tRef.current=setTimeout(()=>setToast(null),2700); }

  async function toggleRec() {
    if (recording) {
      try {
        if (recRef.current?.kind === 'mediarecorder') recRef.current.recorder.stop();
        else recRef.current?.stop?.();
      } catch {}
      return;
    }

    const isSecure =
      location.protocol === 'https:' ||
      location.hostname === 'localhost' ||
      location.hostname === '127.0.0.1';
    if (!isSecure) {
      showToast('音声入力にはHTTPS接続が必要です（GitHub Pages等で公開すると使えます）');
      return;
    }

    // Path A — Gemini transcription (preferred when API key is configured;
    // works fully offline-of-Apple-cloud since transcription is cloud-side
    // Gemini and the recording itself is local).
    if (geminiApiKey) {
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        showToast('マイクの利用を許可してください');
        return;
      }

      const candidates = ['audio/mp4', 'audio/aac', 'audio/ogg', 'audio/webm'];
      const mime = candidates.find(m =>
        typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(m)
      ) || '';
      let recorder;
      try {
        recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
      } catch {
        stream.getTracks().forEach(t => t.stop());
        showToast('録音を開始できませんでした');
        return;
      }

      const chunks = [];
      const captureMime = recorder.mimeType || mime || 'audio/webm';
      recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setRec(false);
        const blob = new Blob(chunks, { type: captureMime });
        if (blob.size === 0) { showToast('音声が録音されませんでした'); return; }
        setLoading(true); setLMsg('Gemini で文字起こし中');
        try {
          const base64 = await blobToBase64(blob);
          const transcript = await callGeminiAudio(geminiApiKey, base64, captureMime);
          if (transcript) {
            setText(p => p ? p + '\n' + transcript : transcript);
            showToast('音声を文字起こししました');
          } else {
            showToast('文字起こし結果が空でした');
          }
        } catch (err) {
          console.error('[Gemini audio]', err);
          showToast('文字起こしに失敗しました');
        }
        setLoading(false);
      };

      try {
        recorder.start();
        recRef.current = { kind: 'mediarecorder', recorder, stream };
        setRec(true);
      } catch {
        stream.getTracks().forEach(t => t.stop());
        showToast('録音を開始できませんでした');
      }
      return;
    }

    // Path B — Web Speech API (no API key, browser-native cloud STT)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      showToast('このブラウザは音声入力に未対応です（設定でGemini APIキーを登録すると利用可能）');
      return;
    }
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
      } catch {
        showToast('マイクの利用を許可してください');
        return;
      }
    }
    let r;
    try {
      r = new SR();
      r.lang = 'ja-JP';
      r.interimResults = true;
      r.continuous = true;
    } catch {
      showToast('音声入力の起動に失敗しました');
      return;
    }
    baseTextRef.current  = text;
    finalTextRef.current = '';
    r.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTextRef.current += t;
        else interim += t;
      }
      const base = baseTextRef.current;
      const sep  = base && (finalTextRef.current || interim) ? '\n' : '';
      setText(base + sep + finalTextRef.current + interim);
    };
    r.onerror = e => {
      const map = {
        'no-speech':           '音声が検出されませんでした',
        'audio-capture':       'マイクが見つかりません',
        'not-allowed':         'マイクの利用が拒否されました',
        'network':             'ネットワーク接続が必要です（音声認識はオンライン必須）',
        'service-not-allowed': '音声認識サービスが利用できません',
      };
      const msg = map[e.error];
      if (msg) showToast(msg);
      setRec(false);
    };
    r.onend = () => {
      const base = baseTextRef.current;
      const sep  = base && finalTextRef.current ? '\n' : '';
      if (finalTextRef.current) setText(base + sep + finalTextRef.current);
      setRec(false);
    };
    try {
      r.start();
      recRef.current = r;
      setRec(true);
    } catch {
      showToast('音声入力を開始できませんでした');
    }
  }

  async function handleImg(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      setImgPrev(ev.target.result);
      const claude = typeof window !== 'undefined' && window.claude && window.claude.complete;
      if (!geminiApiKey && !claude) {
        showToast('画像OCRには Gemini APIキー（設定）が必要です');
        return;
      }
      setLoading(true);
      setLMsg(geminiApiKey ? 'Gemini で画像から文字を抽出中' : '画像からテキストを抽出中');
      try {
        const b64 = ev.target.result.split(',')[1];
        let result = '';
        if (geminiApiKey) {
          result = await callGeminiVision(
            geminiApiKey,
            'この画像に写っているテキストをすべて抽出してください。テキストのみを返してください。',
            b64,
            file.type
          );
        } else if (claude) {
          result = await window.claude.complete({ messages:[{ role:'user', content:[
            { type:'image', source:{ type:'base64', media_type:file.type, data:b64 } },
            { type:'text',  text:'この画像に写っているテキストをすべて抽出してください。テキストのみを返してください。' }
          ]}]});
        }
        if (result) {
          setText(p => p ? p+'\n'+result : result);
          showToast('画像からテキストを抽出しました');
        } else {
          showToast('テキストを抽出できませんでした');
        }
      } catch (err) {
        console.error('[OCR]', err);
        showToast('画像解析に失敗しました');
      }
      setLoading(false);
    };
    reader.readAsDataURL(file); e.target.value='';
  }

  async function reflect(mode) {
    if (!text.trim()) { showToast('メモを入力してください'); return; }
    setLoading(true);
    setLMsg(mode === 'idea' ? 'アイデアとして解析中' : 'TODOとして解析中');
    try {
      const result = await parseMemoToItems(text, existingProjects, geminiApiKey);
      const todos = result.todos || [];
      const ideas = result.ideas || [];
      let todoDrafts, ideaDrafts;

      if (mode === 'idea') {
        // Treat everything as ideas. TODOs are flattened into idea entries
        // (using their title as projectName/summary).
        todoDrafts = [];
        ideaDrafts = [
          ...ideas.map(i => ({
            projectName: i.projectName || 'メモ',
            summary: i.summary || '',
            details: i.details || [],
            tags: i.tags || ['アイデア'],
          })),
          ...todos.map(t => ({
            projectName: t.title || 'メモ',
            summary: '',
            details: [],
            tags: (t.tags && t.tags.length ? t.tags : ['アイデア']),
          })),
        ];
      } else {
        // mode === 'todo' (default): treat everything as TODOs.
        ideaDrafts = [];
        todoDrafts = [
          ...todos.map(t => ({
            title: t.title || 'タスク',
            startDate: t.startDate || '',
            endDate: t.endDate || '',
            time: t.time || '',
            tags: t.tags || [],
          })),
          ...ideas.map(i => ({
            title: i.summary || i.projectName || 'タスク',
            startDate: '',
            endDate: '',
            time: '',
            tags: (i.tags && i.tags.length ? i.tags : ['その他']),
          })),
        ];
      }

      const ts = Date.now();
      todoDrafts = todoDrafts.map((t, i) => ({ ...t, id: `t_${ts}_${i}`, done: false }));
      ideaDrafts = ideaDrafts.map((i, idx) => ({ ...i, id: `i_${ts}_${idx}` }));
      if (!todoDrafts.length && !ideaDrafts.length) throw new Error('empty');
      setPending({ todos: todoDrafts, ideas: ideaDrafts });
    } catch { showToast('解析に失敗しました。再試行してください。'); }
    setLoading(false);
  }

  function confirmPending() {
    const total = pending.todos.length + pending.ideas.length;
    onCommit(pending);
    showToast(`${total}件を追加しました`);
    setText(''); setImgPrev(null); setPending(null);
  }

  return (
    <div className="memo-tab tab-pane">
      {loading && <div className="loading-overlay"><div className="spinner"/><div className="loading-text">{loadingMsg}</div><div className="loading-sub">少々お待ちください</div></div>}
      {toast && <div className="toast">{toast}</div>}
      {pending && (
        <ConfirmSheet
          pending={pending}
          existingProjects={existingProjects}
          customTags={customTags}
          onUpdateTodo={u => setPending(p => ({ ...p, todos: p.todos.map(t => t.id===u.id ? u : t) }))}
          onDeleteTodo={id => setPending(p => ({ ...p, todos: p.todos.filter(t => t.id !== id) }))}
          onUpdateIdea={u => setPending(p => ({ ...p, ideas: p.ideas.map(t => t.id===u.id ? u : t) }))}
          onDeleteIdea={id => setPending(p => ({ ...p, ideas: p.ideas.filter(t => t.id !== id) }))}
          onConfirm={confirmPending}
          onCancel={() => setPending(null)}
        />
      )}

      <div className="memo-card">
        <div className="memo-card-top">
          <span className="memo-card-label">メモ</span>
          <span className="memo-char-count">{text.length}</span>
        </div>
        <textarea className="memo-textarea" placeholder={"思いついたことを自由に入力\n例：来週月曜から水曜まで出張。にんじん・じゃがいも・玉ねぎを買う"} value={text} onChange={e=>setText(e.target.value)} />
        <div className="memo-actions">
          <button className={`action-btn${recording?' recording':''}`} onClick={toggleRec}>
            {recording ? <><span className="pulse-dot"/>録音停止</> : <><IcoMic />音声入力</>}
          </button>
          <button className="action-btn" onClick={()=>fileRef.current?.click()}><IcoImg />画像から入力</button>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImg} />
        </div>
      </div>

      {imgPrev && (
        <div className="img-preview">
          <img src={imgPrev} alt="" />
          <button className="img-clear" onClick={()=>setImgPrev(null)}>✕</button>
        </div>
      )}

      <div className="reflect-actions">
        <button className="reflect-btn" onClick={() => reflect('todo')} disabled={loading}>
          <IcoStar /> TODOに反映
        </button>
        <button className="reflect-btn reflect-btn-secondary" onClick={() => reflect('idea')} disabled={loading}>
          <IcoBulb /> アイデアに反映
        </button>
      </div>

      <div className="hint-card">
        <div className="hint-title">入力のヒント</div>
        <div className="hint-body">
          「明日から来週水曜まで出張」「8月中」「7月1日〜15日」→ 期間つきTODO<br />
          「にんじん、じゃがいも、玉ねぎを買う」→ 3つのTODOに分割<br />
          「新アプリ案: チャット機能を追加」→ プロジェクト『新アプリ案』のアイデア<br />
          既存プロジェクト名で書くと、そのアイデアに詳細が追記されます
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// TODO Tab
// ─────────────────────────────────────────────────────────────
function TodoTab({ todos, onToggle, onDelete, onUpdate, soundEnabled, customTags }) {
  const [sel,      setSel]      = useState(todayStr);
  const [editing,  setEditing]  = useState(null);

  const dateTodos = todos.filter(t => {
    if (!t.startDate) return false;
    const d=new Date(sel), s=new Date(t.startDate), e=t.endDate?new Date(t.endDate):s;
    return d>=s && d<=e;
  });
  const undated = todos.filter(t => !t.startDate);

  return (
    <div className="todo-tab">
      {editing && <EditModal todo={editing} onSave={onUpdate} onClose={()=>setEditing(null)} customTags={customTags} />}
      <Calendar todos={todos} selectedDate={sel} onSelect={setSel} />
      <div className="todo-list-area">
        <div className="section-head">
          <span className="section-head-label">{sel.replace(/-/g,'/')}</span>
          {dateTodos.length>0 && <span className="section-count">{dateTodos.length}</span>}
        </div>
        {dateTodos.length===0
          ? <div className="todo-empty">この日のタスクはありません</div>
          : dateTodos.map(t=><TodoItem key={t.id} todo={t} onToggle={onToggle} onDelete={onDelete} onEdit={setEditing} soundEnabled={soundEnabled} />)
        }
        {undated.length>0 && <>
          <div className="divider"/>
          <div className="section-head">
            <span className="section-head-label">日付未定</span>
            <span className="section-count">{undated.length}</span>
          </div>
          {undated.map(t=><TodoItem key={t.id} todo={t} onToggle={onToggle} onDelete={onDelete} onEdit={setEditing} soundEnabled={soundEnabled} />)}
        </>}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Ideas Tab
// ─────────────────────────────────────────────────────────────
function IdeasTab({ ideas, onUpdate, onDelete, customTags }) {
  const [editing, setEditing] = useState(null);
  const projectNames = ideas.map(i => i.projectName);

  if (ideas.length === 0) {
    return (
      <div className="ideas-tab tab-pane">
        <div className="ideas-empty">
          まだアイデアがありません<br/>
          メモタブで思いついたことを入力し、<br/>
          「TODO・アイデアに反映」を押すと蓄積されます
        </div>
      </div>
    );
  }

  return (
    <div className="ideas-tab tab-pane">
      {editing && (
        <IdeaEditModal
          idea={editing}
          projects={projectNames.filter(p => p !== editing.projectName)}
          onSave={u => { onUpdate(u); setEditing(null); }}
          onClose={() => setEditing(null)}
          customTags={customTags}
        />
      )}
      {ideas.map(i => (
        <div key={i.id} className="idea-card" onClick={() => setEditing(i)}>
          <div className="idea-card-body">
            <div className="idea-project">{i.projectName}</div>
            {i.summary && <div className="idea-summary">{i.summary}</div>}
            {(i.details || []).length > 0 && (
              <ul className="idea-details">
                {i.details.map((d, idx) => <li key={idx} className="idea-detail">{d}</li>)}
              </ul>
            )}
            <div className="idea-meta">
              {(i.tags || []).map(t => <span key={t} className="tag-pill">{t}</span>)}
              {i.updatedAt && <span className="idea-updated">{i.updatedAt}</span>}
            </div>
          </div>
          <button className="todo-del" onClick={e => { e.stopPropagation(); onDelete(i.id); }}>✕</button>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Settings Tab
// ─────────────────────────────────────────────────────────────
function SettingsTab({ settings, onChange }) {
  const { colorIdx, fontIdx, notifEnabled, autoTag, autoDate, completeSound, geminiApiKey } = settings;
  const soundOn = completeSound !== false;
  const [newTag, setNewTag] = useState('');
  const [keyInput, setKeyInput] = useState(geminiApiKey || '');
  const [keyVisible, setKeyVisible] = useState(false);
  const [apiStatus, setApiStatus] = useState({ kind:'idle', msg:'' });
  useEffect(() => { setKeyInput(geminiApiKey || ''); }, [geminiApiKey]);
  function saveKey() {
    onChange('geminiApiKey', keyInput.trim());
    setApiStatus({ kind:'ok', msg:'保存しました' });
    setTimeout(() => setApiStatus({ kind:'idle', msg:'' }), 2200);
  }
  async function testKey() {
    if (!keyInput.trim()) {
      setApiStatus({ kind:'ng', msg:'APIキーを入力してください' }); return;
    }
    setApiStatus({ kind:'idle', msg:'接続テスト中...' });
    try {
      const out = await callGeminiText(keyInput.trim(), 'Reply with the single word: OK');
      if (out) setApiStatus({ kind:'ok', msg:`接続成功（${GEMINI_MODEL}）` });
      else     setApiStatus({ kind:'ng', msg:'応答が空でした' });
    } catch (e) {
      setApiStatus({ kind:'ng', msg:String(e.message || e).slice(0, 80) });
    }
  }
  const trimmed = newTag.trim();
  const canAdd =
    trimmed.length > 0 &&
    !BUILTIN_IDEA_TAGS.includes(trimmed) &&
    !(settings.customTags||[]).includes(trimmed);
  const addTag = () => {
    if (!canAdd) return;
    onChange('customTags', [...(settings.customTags||[]), trimmed]);
    setNewTag('');
  };

  return (
    <div className="settings-tab tab-pane">
      <div className="settings-section-title">表示</div>
      <div className="settings-card">
        <div className="settings-row">
          <div>
            <div className="settings-row-label">ベースカラー</div>
            <div className="settings-row-sub">{COLOR_PRESETS[colorIdx].name}</div>
          </div>
          <div className="color-swatches">
            {COLOR_PRESETS.map((c,i)=>(
              <div key={i} className={`color-swatch${colorIdx===i?' sel':''}`}
                style={{background:c.value}}
                onClick={()=>onChange('colorIdx',i)} />
            ))}
          </div>
        </div>
        <div className="settings-row">
          <div>
            <div className="settings-row-label">文字サイズ</div>
            <div className="settings-row-sub">{FONT_SIZE_OPTS[fontIdx].label}</div>
          </div>
          <div className="font-size-opts">
            {FONT_SIZE_OPTS.map((o,i)=>(
              <button key={i} className={`font-size-opt${fontIdx===i?' sel':''}`}
                style={{fontSize: i===0?'11px': i===1?'13px':'15px'}}
                onClick={()=>onChange('fontIdx',i)}>{o.label}</button>
            ))}
          </div>
        </div>
      </div>

      <div className="settings-section-title">通知・サウンド</div>
      <div className="settings-card">
        <div className="settings-row">
          <div>
            <div className="settings-row-label">タスク通知</div>
            <div className="settings-row-sub">期限前にリマインド</div>
          </div>
          <button className={`toggle${notifEnabled?' on':' off'}`} onClick={()=>onChange('notifEnabled',!notifEnabled)} />
        </div>
        <div className="settings-row">
          <div>
            <div className="settings-row-label">完了サウンド</div>
            <div className="settings-row-sub">TODOにチェックを入れた時に音とアニメーション</div>
          </div>
          <button className={`toggle${soundOn?' on':' off'}`} onClick={()=>onChange('completeSound',!soundOn)} />
        </div>
      </div>

      <div className="settings-section-title">AI 連携（Gemini）</div>
      <div className="settings-card">
        <div className="api-row">
          <div className="settings-row-label">Gemini APIキー</div>
          <div className="settings-row-sub">
            設定すると音声・画像・メモ解析に Gemini を使用します。
            未設定時はローカル解析にフォールバック。
            <br/>取得: aistudio.google.com → Get API key
          </div>
          <div className="api-input-row">
            <input
              type={keyVisible ? 'text' : 'password'}
              value={keyInput}
              onChange={e=>setKeyInput(e.target.value)}
              placeholder="AIza..."
              autoComplete="off"
              spellCheck={false}
            />
            <button className="secondary" onClick={()=>setKeyVisible(v=>!v)}>{keyVisible?'隠':'表'}</button>
          </div>
          <div className="api-input-row">
            <button onClick={saveKey} disabled={keyInput.trim() === (geminiApiKey || '')}>保存</button>
            <button className="secondary" onClick={testKey} disabled={!keyInput.trim()}>接続テスト</button>
            {geminiApiKey && (
              <button className="secondary" onClick={()=>{ setKeyInput(''); onChange('geminiApiKey',''); setApiStatus({ kind:'ok', msg:'削除しました' }); }}>削除</button>
            )}
          </div>
          {apiStatus.msg && (
            <div className={`api-status ${apiStatus.kind}`}>{apiStatus.msg}</div>
          )}
        </div>
      </div>

      <div className="settings-section-title">AI 設定</div>
      <div className="settings-card">
        <div className="settings-row">
          <div>
            <div className="settings-row-label">自動タグ付け</div>
            <div className="settings-row-sub">タスク解析時に自動でタグを付与</div>
          </div>
          <button className={`toggle${autoTag?' on':' off'}`} onClick={()=>onChange('autoTag',!autoTag)} />
        </div>
        <div className="settings-row">
          <div>
            <div className="settings-row-label">日付の自動推定</div>
            <div className="settings-row-sub">「来週」などの相対日付を解析</div>
          </div>
          <button className={`toggle${autoDate?' on':' off'}`} onClick={()=>onChange('autoDate',!autoDate)} />
        </div>
      </div>

      <div className="settings-section-title">タグ</div>
      <div className="settings-card">
        <div className="tag-row">
          <div className="settings-row-label">既定タグ</div>
          <div className="settings-row-sub">削除はできません。アイデア用は「アイデア」のみ</div>
          <div className="tag-chip-list">
            {BUILTIN_IDEA_TAGS.map(t => (
              <span key={t} className="tag-chip tag-chip-builtin">{t}</span>
            ))}
          </div>
        </div>
        <div className="tag-row">
          <div className="settings-row-label">カスタムタグ</div>
          <div className="settings-row-sub">独自のタグを追加・削除できます（TODO・アイデア両方で使用可能）</div>
          {(settings.customTags||[]).length > 0 && (
            <div className="tag-chip-list">
              {(settings.customTags||[]).map(t => (
                <span key={t} className="tag-chip">
                  {t}
                  <button onClick={() => onChange('customTags', (settings.customTags||[]).filter(x => x !== t))}>×</button>
                </span>
              ))}
            </div>
          )}
          <div className="tag-add-row">
            <input value={newTag} onChange={e=>setNewTag(e.target.value)}
              placeholder="新しいタグ名（例: 副業）"
              onKeyDown={e=>{ if (e.key==='Enter') addTag(); }}
              maxLength="12" />
            <button disabled={!canAdd} onClick={addTag}>追加</button>
          </div>
        </div>
      </div>

      <div className="settings-section-title">アプリ情報</div>
      <div className="about-card">
        <div className="about-app-name">SmartMemo</div>
        <div className="about-version">Version 1.0.0</div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Root
// ─────────────────────────────────────────────────────────────
function SmartMemoApp() {
  const [tab, setTab] = useState('memo');
  const [todos, setTodos] = usePersistedState(LS_TODOS, [
    { id:1, title:'プレゼン資料の作成', startDate:todayStr, endDate:'', time:'10:00', tags:['仕事'], done:false },
    { id:2, title:'牛乳を購入する',     startDate:todayStr, endDate:'', time:'',      tags:['買い物'],done:false },
    { id:3, title:'部屋の片付け',        startDate:'',       endDate:'', time:'',      tags:['家事'], done:false },
  ]);
  const [ideas, setIdeas] = usePersistedState(LS_IDEAS, []);
  const [settings, setSettings] = usePersistedState(LS_SETTINGS, { colorIdx:0, fontIdx:1, notifEnabled:true, autoTag:true, autoDate:true, completeSound:true, customTags:[], geminiApiKey:'' });

  // Ask the browser to keep our data even under storage pressure (iOS ITP, etc.)
  useEffect(() => {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }
  }, []);

  // Final-resort flush when the page is hidden or backgrounded
  useEffect(() => {
    const flush = () => {
      saveStored(LS_TODOS, todos);
      saveStored(LS_IDEAS, ideas);
      saveStored(LS_SETTINGS, settings);
    };
    const onVis = () => { if (document.visibilityState === 'hidden') flush(); };
    window.addEventListener('pagehide', flush);
    document.addEventListener('visibilitychange', onVis);
    return () => {
      window.removeEventListener('pagehide', flush);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, [todos, ideas, settings]);

  const color = COLOR_PRESETS[settings.colorIdx];
  const font  = FONT_SIZE_OPTS[settings.fontIdx];

  useEffect(() => {
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', color.value);
  }, [color.value]);

  const appStyle = {
    '--accent':       color.value,
    '--accent-light': color.light,
    '--accent-text':  color.text,
    '--fs-base':      font.base,
    '--fs-sm':        font.sm,
    '--fs-xs':        font.xs,
  };

  const existingProjects = ideas.map(i => i.projectName);

  function commit({ todos: newTodos = [], ideas: newIdeas = [] }) {
    if (newTodos.length) {
      setTodos(p => [...p, ...newTodos.map(t => ({
        ...t, id: typeof t.id === 'string' ? Date.now()+Math.random() : t.id
      }))]);
    }
    if (newIdeas.length) {
      setIdeas(prev => mergeIdeas(prev, newIdeas));
    }
    // Land on the most relevant tab
    if (newTodos.length && !newIdeas.length) setTab('todo');
    else if (!newTodos.length && newIdeas.length) setTab('idea');
    else if (newTodos.length && newIdeas.length) setTab('todo');
  }

  const toggle    = id    => setTodos(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const remove    = id    => setTodos(p=>p.filter(t=>t.id!==id));
  const update    = item  => setTodos(p=>p.map(t=>t.id===item.id?item:t));
  const updateIdea= item  => setIdeas(p=>p.map(i=>i.id===item.id?{...item, updatedAt: formatDate(new Date())}:i));
  const removeIdea= id    => setIdeas(p=>p.filter(i=>i.id!==id));
  const setSetting= (k,v) => setSettings(p=>({...p,[k]:v}));

  return (
    <div className="app" style={appStyle}>
      <div className="app-header">
        <h1>SmartMemo</h1>
        <span className="tagline">AI でタスクを自動整理</span>
      </div>
      <div className="tab-content">
        {tab==='memo'     && <MemoTab existingProjects={existingProjects} customTags={settings.customTags||[]} geminiApiKey={settings.geminiApiKey||''} onCommit={commit} />}
        {tab==='todo'     && <TodoTab todos={todos} onToggle={toggle} onDelete={remove} onUpdate={update} soundEnabled={settings.completeSound !== false} customTags={settings.customTags||[]} />}
        {tab==='idea'     && <IdeasTab ideas={ideas} onUpdate={updateIdea} onDelete={removeIdea} customTags={settings.customTags||[]} />}
        {tab==='settings' && <SettingsTab settings={settings} onChange={setSetting} />}
      </div>
      <div className="bottom-nav">
        {[
          { key:'memo',     label:'メモ入力', Icon:IcoMemoNav },
          { key:'todo',     label:'TODO',     Icon:IcoTodoNav },
          { key:'idea',     label:'アイデア', Icon:IcoIdeaNav },
          { key:'settings', label:'設定',     Icon:IcoSettingsNav },
        ].map(({ key, label, Icon }) => (
          <div key={key} className={`nav-tab${tab===key?' active':''}`} onClick={()=>setTab(key)}>
            <span className="nav-icon"><Icon active={tab===key} /></span>
            <span className="nav-label">{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

const FRAME_W = 402;
const FRAME_H = 874;

function Root() {
  // Show fullscreen (no device frame) when:
  // - window is too small to comfortably show the frame, OR
  // - device is touch-based (real phone/tablet), OR
  // - running as installed PWA
  const detect = () => {
    if (typeof window === 'undefined') return true;
    return (
      window.innerWidth  < FRAME_W + 60 ||
      window.innerHeight < FRAME_H + 40 ||
      window.matchMedia('(pointer:coarse)').matches ||
      window.matchMedia('(display-mode:standalone)').matches ||
      window.navigator.standalone === true
    );
  };
  const [fullscreen, setFullscreen] = useState(detect);
  useEffect(() => {
    const update = () => setFullscreen(detect());
    const mqs = [
      window.matchMedia('(pointer:coarse)'),
      window.matchMedia('(display-mode:standalone)'),
    ];
    mqs.forEach(mq => mq.addEventListener('change', update));
    window.addEventListener('resize', update);
    return () => {
      mqs.forEach(mq => mq.removeEventListener('change', update));
      window.removeEventListener('resize', update);
    };
  }, []);

  if (fullscreen) return <SmartMemoApp />;
  return <IOSDevice><SmartMemoApp /></IOSDevice>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>

<script>
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        // Check for updates each load so a stale cached app shell doesn't get
        // stuck on an old version (e.g. one without persistence).
        reg.update().catch(() => {});
      }).catch(() => {});
    });
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  }
</script>
